<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>10周年抽抽乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, 'PingFang SC', Roboto, sans-serif;
            background: #FFFACD;
            padding: 20px 30px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .main-title {
            font-size: 42px;
            font-weight: 900;
            text-align: center;
            color: #5BA3D9;
            padding: 10px 0 24px;
            letter-spacing: 3px;
        }
        .stats-wrapper {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 18px 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            padding: 14px 8px;
            text-align: center;
        }
        .stat-card .label {
            font-size: 14px;
            font-weight: 600;
            color: #888;
        }
        .stat-card .value {
            font-size: 30px;
            font-weight: 800;
            margin-top: 2px;
        }
        .stat-card .percent {
            font-size: 12px;
            color: #aaa;
        }
        .stat-ur .value {
            color: #E91E63;
        }
        .stat-sp .value {
            color: #E74C3C;
        }
        .stat-ssr .value {
            color: #d4a017;
        }
        .stat-sr .value {
            color: #9B59B6;
        }
        .stat-r .value {
            color: #5B8DD9;
        }
        .stat-total .value {
            color: #5BA3D9;
        }

        /* 单卡池统计（与全局统计样式一致，但加了个小标签区分） */
        .pool-stats-wrapper {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 14px 20px;
            margin-bottom: 18px;
            border: 2px solid #d4e4ed;
            position: relative;
        }
        .pool-stats-wrapper .pool-stats-label {
            position: absolute;
            top: -10px;
            left: 20px;
            background: #5BA3D9;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            padding: 0 14px;
            border-radius: 20px;
            line-height: 22px;
            letter-spacing: 0.5px;
        }
        .pool-stats-wrapper .stats-row {
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }
        .pool-stats-wrapper .stat-card {
            background: rgba(255, 255, 255, 0.4);
            padding: 10px 6px;
        }
        .pool-stats-wrapper .stat-card .value {
            font-size: 26px;
        }

        .pool-tabs {
            display: flex;
            gap: 14px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .pool-tab {
            padding: 10px 34px;
            border-radius: 40px;
            border: 2px solid #c0dce8;
            background: #fff;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            color: #555;
            transition: all 0.15s;
        }
        .pool-tab.active {
            border-color: #5BA3D9;
            background: #5BA3D9;
            color: #fff;
            box-shadow: 0 4px 16px rgba(91, 163, 217, 0.3);
        }
        .pool-tab:hover:not(.active) {
            border-color: #7EC8E3;
            background: #f8fcff;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            margin: 6px 0 18px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 28px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #5BA3D9, #89CFF0);
            color: #fff;
            box-shadow: 0 4px 16px rgba(91, 163, 217, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #fff;
            border: 2px solid #f0e6ed;
            color: #c0392b;
        }
        .btn-danger:hover {
            background: #fef6f5;
        }

        .pool-section {
            margin-bottom: 28px;
            border-radius: 20px;
            padding: 20px;
            background: #fefef9;
        }
        .pool-section-title {
            font-size: 26px;
            font-weight: 800;
            color: #5a4a3a;
            padding-bottom: 6px;
            margin-bottom: 16px;
            border-bottom: none;
        }

        .rarity-groups-flow {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 28px;
            align-items: flex-start;
        }
        .rarity-group {
            flex: 0 1 auto;
        }
        .rarity-label {
            font-size: 18px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 8px;
            padding: 4px 18px;
            border-radius: 12px;
            background: #f5efe2;
            color: #5a4a3a;
        }
        .rarity-ur .rarity-label {
            background: #fce4ec;
            color: #b34159;
        }
        .rarity-sp .rarity-label {
            background: #ffeaea;
            color: #b83a2a;
        }
        .rarity-ssr .rarity-label {
            background: #fef6e0;
            color: #8a6914;
        }
        .rarity-sr .rarity-label {
            background: #f3e8f7;
            color: #7b4a8c;
        }
        .rarity-r .rarity-label {
            background: #e8f0fe;
            color: #4a6fa5;
        }

        .category-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            align-items: flex-start;
        }
        .category-box {
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid #e0d6c2;
            border-radius: 16px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: fit-content;
            min-width: 130px;
            max-width: 100%;
            flex: 0 0 auto;
        }
        .category-box .category-label {
            font-size: 16px;
            font-weight: 700;
            color: #5a4a3a;
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.3;
            width: auto;
        }
        .category-label:hover {
            background: rgba(91, 163, 217, 0.15);
        }
        .category-box .category-label .total-count {
            font-size: 12px;
            font-weight: 600;
            color: #8b7355;
        }
        .category-box .card-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 10px;
            justify-content: center;
            width: 100%;
        }

        .card-mini {
            width: 84px;
            flex: 0 0 84px;
            height: 72px;
            background: #fff;
            border-radius: 10px;
            padding: 6px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            border: 2px solid;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-mini:active {
            transform: scale(0.95);
        }
        .card-mini .mini-id {
            font-weight: 700;
            font-size: 16px;
            color: #333;
            white-space: nowrap;
        }
        .card-mini .mini-count {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .card-mini .mini-count span {
            font-weight: 700;
            color: #8b7355;
        }
        .card-mini.unowned {
            opacity: 0.4;
            filter: grayscale(0.5);
        }
        .card-mini .owned-dot {
            display: inline-block;
            margin-left: 2px;
            font-size: 10px;
            color: #c9a87c;
        }
        .card-mini.rarity-ur {
            border-color: #E91E63;
        }
        .card-mini.rarity-sp {
            border-color: #E74C3C;
        }
        .card-mini.rarity-ssr {
            border-color: #d4a017;
        }
        .card-mini.rarity-sr {
            border-color: #9B59B6;
        }
        .card-mini.rarity-r {
            border-color: #5B8DD9;
        }
        .card-mini.unowned {
            border-color: #ddd !important;
        }
        .card-mini.rarity-ur.owned {
            background: #ffe6ec;
        }
        .card-mini.rarity-sp.owned {
            background: #ffeaea;
        }
        .card-mini.rarity-ssr.owned {
            background: #fef6e0;
        }
        .card-mini.rarity-sr.owned {
            background: #f3e8f7;
        }
        .card-mini.rarity-r.owned {
            background: #e8f0fe;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #ccc;
            font-size: 18px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: 24px;
            max-width: 680px;
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            padding: 24px 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }
        .modal h2 {
            font-size: 22px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal .close-btn {
            margin-left: auto;
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            color: #aaa;
            padding: 0 6px;
        }
        .modal .close-btn:active {
            color: #555;
        }
        .modal .form-group {
            margin-bottom: 14px;
        }
        .modal .form-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 3px;
            font-size: 13px;
            color: #555;
        }
        .modal .form-group select,
        .modal .form-group input[type="number"],
        .modal .form-group input[type="datetime-local"],
        .modal .form-group input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #e0dceb;
            font-size: 14px;
            outline: none;
            background: #fff;
        }
        .modal .form-group select:focus,
        .modal .form-group input:focus {
            border-color: #5BA3D9;
        }
        .time-mode-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .time-mode-btn {
            padding: 5px 16px;
            border-radius: 24px;
            border: 2px solid #ddd;
            background: #fff;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            color: #555;
            flex: 1;
            text-align: center;
        }
        .time-mode-btn.active {
            border-color: #5BA3D9;
            background: #5BA3D9;
            color: #fff;
        }
        .slot-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 8px 0 14px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .slot-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 10px;
            align-items: center;
            background: #f8f6fc;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #edeaf3;
        }
        .slot-row .slot-index {
            font-weight: 700;
            color: #888;
            min-width: 34px;
            font-size: 13px;
        }
        /* 输入框样式 */
        .slot-row .slot-input {
            flex: 1 1 auto;
            min-width: 100px;
            max-width: 180px;
            padding: 6px 10px;
            border-radius: 8px;
            border: 2px solid #e0dceb;
            font-size: 14px;
            background: #fff;
            outline: none;
            font-weight: 600;
            color: #333;
            text-transform: lowercase;
        }
        .slot-row .slot-input:focus {
            border-color: #5BA3D9;
        }
        .slot-row .slot-input::placeholder {
            color: #bbb;
            font-weight: 400;
            font-size: 12px;
            text-transform: none;
        }
        .slot-row .slot-input.invalid {
            border-color: #e74c3c;
            background: #fff5f5;
        }
        .slot-row .slot-input.valid {
            border-color: #27ae60;
            background: #f0faf4;
        }
        .slot-row .slot-hint {
            font-size: 11px;
            color: #aaa;
            min-width: 40px;
        }
        .slot-row .slot-hint.ok {
            color: #27ae60;
        }
        .slot-row .slot-hint.err {
            color: #e74c3c;
        }

        .modal .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .modal .btn-group .btn {
            flex: 1 1 auto;
            justify-content: center;
        }
        #modalMessage {
            margin-top: 10px;
            color: #e74c3c;
            font-size: 13px;
            font-weight: 600;
        }

        #detailModal .modal {
            max-width: 460px;
            text-align: center;
        }
        #detailImage {
            max-width: 100%;
            max-height: 50vh;
            border-radius: 14px;
            margin-top: 6px;
            background: #f0ecf7;
            border: 1px solid #edeaf3;
        }
        #detailName {
            margin-top: 12px;
            font-weight: 700;
            font-size: 22px;
        }
        #detailRarity {
            margin-top: 3px;
            font-size: 15px;
            color: #888;
        }
        #detailHistory {
            margin-top: 10px;
            text-align: left;
            font-size: 13px;
            color: #555;
            max-height: 180px;
            overflow-y: auto;
            background: #f8f6fc;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid #edeaf3;
        }
        .batch-group {
            margin-bottom: 4px;
            border-bottom: 1px dashed #ddd;
            padding-bottom: 3px;
        }
        .batch-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .batch-title {
            font-weight: 700;
            color: #5BA3D9;
            font-size: 13px;
        }
        .batch-time {
            font-size: 11px;
            color: #999;
        }
        .batch-index-list {
            font-size: 12px;
            color: #555;
            padding-left: 4px;
        }
        .batch-index-list .idx-item {
            display: inline-block;
            margin-right: 4px;
            background: rgba(91, 163, 217, 0.08);
            padding: 0 6px;
            border-radius: 4px;
        }

        .footer-actions {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            border-top: 1px solid #edeaf3;
            padding-top: 14px;
            flex-wrap: wrap;
        }

        .category-modal .modal {
            max-width: 520px;
        }
        .category-grid {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .category-grid .cat-img {
            width: 200px;
            max-width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 10px;
            background: #f0ecf7;
            border: 1px solid #edeaf3;
        }
        .category-grid .cat-label {
            font-size: 14px;
            text-align: center;
            font-weight: 600;
            color: #555;
            margin-top: 4px;
        }

        /* 自定义datalist样式微调（仅部分浏览器支持） */
        input::-webkit-calendar-picker-indicator {
            opacity: 0.5;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            body {
                padding: 14px 16px;
            }
            .stats-row {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .pool-stats-wrapper .stats-row {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }
            .main-title {
                font-size: 32px;
            }
            .pool-tab {
                font-size: 15px;
                padding: 8px 20px;
            }
            .pool-section-title {
                font-size: 22px;
            }
            .card-mini {
                width: 78px;
                flex: 0 0 78px;
                padding: 6px 6px;
            }
            .card-mini .mini-id {
                font-size: 15px;
            }
            .slot-row .slot-input {
                min-width: 80px;
                max-width: 140px;
                font-size: 13px;
            }
        }
        @media (max-width: 600px) {
            body {
                padding: 10px 12px;
            }
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
            }
            .pool-stats-wrapper .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 4px;
            }
            .stat-card .value {
                font-size: 24px;
            }
            .pool-stats-wrapper .stat-card .value {
                font-size: 20px;
            }
            .main-title {
                font-size: 26px;
            }
            .pool-tab {
                font-size: 13px;
                padding: 6px 14px;
            }
            .pool-section-title {
                font-size: 18px;
            }
            .card-mini {
                width: 68px;
                flex: 0 0 68px;
                padding: 5px 4px;
            }
            .card-mini .mini-id {
                font-size: 14px;
            }
            .modal {
                padding: 14px;
            }
            .modal h2 {
                font-size: 18px;
            }
            .category-grid .cat-img {
                width: 150px;
            }
            .rarity-groups-flow {
                flex-wrap: nowrap;
                overflow-x: auto;
                gap: 12px 20px;
                padding-bottom: 8px;
            }
            .rarity-group {
                flex: 0 0 auto;
                min-width: 260px;
            }
            .slot-row .slot-input {
                min-width: 70px;
                max-width: 120px;
                font-size: 12px;
            }
            .slot-row .slot-index {
                font-size: 12px;
                min-width: 28px;
            }
        }
        @media (max-width: 400px) {
            .card-mini {
                width: 60px;
                flex: 0 0 60px;
                padding: 4px 3px;
            }
            .card-mini .mini-id {
                font-size: 13px;
            }
            .slot-row .slot-input {
                min-width: 60px;
                max-width: 100px;
                font-size: 11px;
            }
        }
        .slot-list::-webkit-scrollbar {
            width: 4px;
        }
        .slot-list::-webkit-scrollbar-thumb {
            background: #d5cee8;
            border-radius: 8px;
        }
        .slot-list::-webkit-scrollbar-track {
            background: #f0ecf7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-title">10周年抽抽乐</div>

        <!-- 全局统计 -->
        <div class="stats-wrapper">
            <div class="stats-row" id="statsRow">
                <div class="stat-card stat-total"><div class="label">总抽数</div><div class="value" id="statTotal">0</div><div class="percent" id="statTotalPct">100%</div></div>
                <div class="stat-card stat-ur"><div class="label">UR</div><div class="value" id="statUR">0</div><div class="percent" id="statURPct">0%</div></div>
                <div class="stat-card stat-sp"><div class="label">SP</div><div class="value" id="statSP">0</div><div class="percent" id="statSPPct">0%</div></div>
                <div class="stat-card stat-ssr"><div class="label">SSR</div><div class="value" id="statSSR">0</div><div class="percent" id="statSSRPct">0%</div></div>
                <div class="stat-card stat-sr"><div class="label">SR</div><div class="value" id="statSR">0</div><div class="percent" id="statSRPct">0%</div></div>
                <div class="stat-card stat-r"><div class="label">R</div><div class="value" id="statR">0</div><div class="percent" id="statRPct">0%</div></div>
            </div>
        </div>

        <!-- 单卡池统计（由JS动态渲染，初始隐藏） -->
        <div id="poolStatsContainer" style="display:none;"></div>

        <div class="pool-tabs">
            <button class="pool-tab active" data-pool="all">📋 全部</button>
            <button class="pool-tab" data-pool="A">A卡池-兔兔池</button>
            <button class="pool-tab" data-pool="B">B卡池-猫猫池</button>
        </div>

        <div class="toolbar">
            <button class="btn btn-primary" id="openAddModal">➕ 新增抽卡</button>
        </div>

        <div id="cardList">
            <div class="empty-state">还没有卡牌，点击「新增抽卡」开始记录！</div>
        </div>

        <div class="footer-actions">
            <button class="btn btn-danger" id="clearAllBtn">🗑️ 清空所有卡牌</button>
        </div>

        <!-- 新增抽卡弹窗 -->
        <div class="modal-overlay" id="addModal">
            <div class="modal">
                <h2>📥 新增抽卡记录 <button class="close-btn" id="closeAddModalBtn">✕</button></h2>
                <div class="form-group"><label>选择卡池</label><select id="modalPool"><option value="A">A卡池-兔兔池</option><option value="B">B卡池-猫猫池</option></select></div>
                <div class="form-group"><label>抽数</label><input type="number" id="modalPullCount" value="1" min="0" max="99" /></div>
                <div class="form-group"><label>⏰ 时间模式</label>
                    <div class="time-mode-group" id="timeModeGroup">
                        <button class="time-mode-btn active" data-mode="now">当前时间</button>
                        <button class="time-mode-btn" data-mode="custom">自定义时间</button>
                    </div>
                    <input type="datetime-local" id="customTimeInput" style="display:none; margin-top:6px;" />
                </div>
                <div class="form-group"><label>每一抽的卡牌（可输入或选择，不区分大小写）</label>
                    <div class="slot-list" id="slotList"></div>
                    <div style="font-size:12px;color:#999;margin-top:4px;">💡 输入如 r1 / SR2 / ssr3，按 Enter 或点击确认</div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="submitPull">✅ 确认添加</button>
                    <button class="btn btn-danger" id="cancelAddBtn">取消</button>
                </div>
                <div id="modalMessage"></div>
            </div>
        </div>

        <!-- 详情弹窗 -->
        <div class="modal-overlay" id="detailModal">
            <div class="modal">
                <button class="close-btn" id="closeDetailBtn">✕</button>
                <img id="detailImage" src="" alt="卡牌图片" style="display:block; margin: 0 auto;" />
                <div id="detailName" style="margin-top:12px;"></div>
                <div id="detailRarity" style="margin-top:4px;"></div>
                <div id="detailHistory" style="margin-top:8px;"></div>
            </div>
        </div>

        <!-- 分类照片弹窗 -->
        <div class="modal-overlay" id="categoryModal">
            <div class="modal" style="max-width:520px;">
                <h2>📸 <span id="categoryModalTitle">分类名称</span><button class="close-btn" id="closeCategoryBtn">✕</button></h2>
                <div class="category-grid" id="categoryGrid"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const STORAGE_KEY = 'tenniversary_cards_v14';

            // ---------- 卡牌数据定义 ----------
            const CARD_CATEGORIES = {
                'R': [
                    { category: '写真卡', ids: ['r1', 'r2', 'r3', 'r4'] },
                    { category: '活动卡', ids: ['r5', 'r6', 'r7', 'r8'] },
                    { category: '横卡', ids: ['r9', 'r10', 'r11', 'r12'] }
                ],
                'SR': [
                    { category: '背影卡', ids: ['sr1', 'sr2'] },
                    { category: '宠物卡', ids: ['sr3', 'sr4', 'sr5', 'sr6'] },
                    { category: '拼字卡', ids: ['sr7', 'sr8', 'sr9', 'sr10'] },
                    { category: '童年卡', ids: ['sr11'] }
                ],
                'SSR': [
                    { category: '搞怪卡', ids: ['ssr1', 'ssr2', 'ssr3'] },
                    { category: '古风卡', ids: ['ssr4', 'ssr5'] },
                    { category: '早期卡', ids: ['ssr6', 'ssr7', 'ssr8'] }
                ],
                'SP': [
                    { category: '手写卡', ids: ['sp1', 'sp2', 'sp3', 'sp4'] },
                    { category: '连环画卡', ids: ['sp5', 'sp6'] }
                ]
            };
            const UR_CATEGORIES = {
                'A': [
                    { category: '兔兔卡套', ids: ['ur1'] },
                    { category: '兔娃娃', ids: ['ur2'] },
                    { category: '施华蔻洗发水', ids: ['ur3'] },
                    { category: '星期六洞洞鞋', ids: ['ur4'] },
                    { category: '签名照', ids: ['ur5'] }
                ],
                'B': [
                    { category: '猫猫卡套', ids: ['ur1'] },
                    { category: '猫娃娃', ids: ['ur2'] },
                    { category: '施华蔻洗发水', ids: ['ur3'] },
                    { category: '星期六洞洞鞋', ids: ['ur4'] },
                    { category: '签名照', ids: ['ur5'] }
                ]
            };
            const RARITY_ORDER = { 'UR': 0, 'SP': 1, 'SSR': 2, 'SR': 3, 'R': 4 };

            // ---------- 工具函数 ----------
            // 自然排序：按字母部分 + 数字部分排序
            function naturalSort(arr) {
                return arr.slice().sort((a, b) => {
                    const ma = a.match(/^([a-z]+)(\d+)$/i);
                    const mb = b.match(/^([a-z]+)(\d+)$/i);
                    if (ma && mb) {
                        const cmp = ma[1].toLowerCase().localeCompare(mb[1].toLowerCase());
                        if (cmp !== 0) return cmp;
                        return parseInt(ma[2], 10) - parseInt(mb[2], 10);
                    }
                    return a.localeCompare(b);
                });
            }

            // 获取所有有效卡牌ID（自然排序）
            function getAllValidIds() {
                const set = new Set();
                Object.values(CARD_CATEGORIES).forEach(cats => cats.forEach(c => c.ids.forEach(id => set.add(id))));
                for (let i = 1; i <= 5; i++) set.add('ur' + i);
                return naturalSort([...set]);
            }

            const VALID_IDS = getAllValidIds();
            const VALID_IDS_LOWER = VALID_IDS.map(id => id.toLowerCase());

            function isValidId(input) {
                if (!input) return false;
                const lower = input.toLowerCase().trim();
                return VALID_IDS_LOWER.includes(lower);
            }

            function normalizeId(input) {
                if (!input) return null;
                const lower = input.toLowerCase().trim();
                if (VALID_IDS_LOWER.includes(lower)) {
                    // 返回原始大小写形式（用VALID_IDS中的对应项）
                    const idx = VALID_IDS_LOWER.indexOf(lower);
                    return VALID_IDS[idx];
                }
                return null;
            }

            function getRarity(id) {
                if (id.startsWith('ur')) return 'UR';
                for (const [r, cats] of Object.entries(CARD_CATEGORIES)) {
                    if (cats.some(c => c.ids.includes(id))) return r;
                }
                return 'R';
            }

            function getCategory(id, pool) {
                if (id.startsWith('ur')) {
                    const arr = UR_CATEGORIES[pool] || [];
                    const found = arr.find(c => c.ids.includes(id));
                    return found ? found.category : 'UR';
                }
                for (const cats of Object.values(CARD_CATEGORIES)) {
                    const found = cats.find(c => c.ids.includes(id));
                    if (found) return found.category;
                }
                return id;
            }

            function getCardImg(pool, id) {
                return `./images/${pool}_${id}.png`;
            }

            function getCatImg(pool, id) {
                if (id.startsWith('ur')) return getCardImg(pool, id);
                return `./images/${pool}_${getCategory(id, pool)}.png`;
            }

            // ---------- 数据管理 ----------
            let appData = { cards: [] };
            let currentView = 'all';

            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (parsed && Array.isArray(parsed.cards)) {
                            parsed.cards.forEach(c => {
                                if (!Array.isArray(c.history)) {
                                    c.history = [];
                                    for (let i = 0; i < (c.count || 0); i++) {
                                        c.history.push({ time: new Date().toISOString(), globalIndex: 0 });
                                    }
                                }
                                c.count = c.history.length;
                            });
                            appData = parsed;
                            return;
                        }
                    }
                } catch (e) {}
                appData = { cards: [] };
            }

            function saveData() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
            }

            function totalPulls() {
                return appData.cards.reduce((sum, c) => sum + c.history.length, 0);
            }

            function getPoolCards(pool) {
                return appData.cards.filter(c => c.pool === pool);
            }

            function getPoolStats(pool) {
                const poolCards = getPoolCards(pool);
                const counts = { UR: 0, SP: 0, SSR: 0, SR: 0, R: 0 };
                let total = 0;
                poolCards.forEach(c => {
                    const r = getRarity(c.name);
                    if (counts.hasOwnProperty(r)) counts[r] += c.history.length;
                    total += c.history.length;
                });
                return { total, counts };
            }

            // ---------- DOM 引用 ----------
            const $ = s => document.querySelector(s);
            const $$ = s => document.querySelectorAll(s);

            const cardList = $('#cardList');
            const poolStatsContainer = $('#poolStatsContainer');

            // ---------- 渲染：统计 ----------
            function renderStats() {
                const counts = { UR: 0, SP: 0, SSR: 0, SR: 0, R: 0 };
                let total = 0;
                appData.cards.forEach(c => {
                    const r = getRarity(c.name);
                    if (counts.hasOwnProperty(r)) counts[r] += c.history.length;
                    total += c.history.length;
                });
                $('#statTotal').textContent = total;
                $('#statUR').textContent = counts.UR;
                $('#statSP').textContent = counts.SP;
                $('#statSSR').textContent = counts.SSR;
                $('#statSR').textContent = counts.SR;
                $('#statR').textContent = counts.R;
                const pct = n => total ? Math.round(n / total * 100) + '%' : '0%';
                $('#statTotalPct').textContent = '100%';
                $('#statURPct').textContent = pct(counts.UR);
                $('#statSPPct').textContent = pct(counts.SP);
                $('#statSSRPct').textContent = pct(counts.SSR);
                $('#statSRPct').textContent = pct(counts.SR);
                $('#statRPct').textContent = pct(counts.R);
            }

            // ---------- 渲染：单卡池统计 ----------
            function renderPoolStats(pool) {
                const stats = getPoolStats(pool);
                const { total, counts } = stats;
                const pct = n => total ? Math.round(n / total * 100) + '%' : '0%';
                const poolLabel = pool === 'A' ? 'A卡池-兔兔池' : 'B卡池-猫猫池';
                const html = `
                    <div class="pool-stats-wrapper">
                        <div class="pool-stats-label">📊 ${poolLabel} 统计</div>
                        <div class="stats-row">
                            <div class="stat-card stat-total"><div class="label">总抽数</div><div class="value">${total}</div><div class="percent">100%</div></div>
                            <div class="stat-card stat-ur"><div class="label">UR</div><div class="value">${counts.UR}</div><div class="percent">${pct(counts.UR)}</div></div>
                            <div class="stat-card stat-sp"><div class="label">SP</div><div class="value">${counts.SP}</div><div class="percent">${pct(counts.SP)}</div></div>
                            <div class="stat-card stat-ssr"><div class="label">SSR</div><div class="value">${counts.SSR}</div><div class="percent">${pct(counts.SSR)}</div></div>
                            <div class="stat-card stat-sr"><div class="label">SR</div><div class="value">${counts.SR}</div><div class="percent">${pct(counts.SR)}</div></div>
                            <div class="stat-card stat-r"><div class="label">R</div><div class="value">${counts.R}</div><div class="percent">${pct(counts.R)}</div></div>
                        </div>
                    </div>
                `;
                poolStatsContainer.innerHTML = html;
                poolStatsContainer.style.display = 'block';
            }

            // ---------- 渲染：卡片列表 ----------
            function renderRarityWithCats(rarity, pool, poolCards) {
                const cats = rarity === 'UR' ? UR_CATEGORIES[pool] : CARD_CATEGORIES[rarity];
                if (!cats) return '';
                let html =
                    `<div class="rarity-group rarity-${rarity.toLowerCase()}"><div class="rarity-label">${rarity}</div><div class="category-row">`;
                cats.forEach(cat => {
                    const ids = cat.ids;
                    let total = 0;
                    ids.forEach(id => {
                        const card = poolCards.find(c => c.name === id);
                        if (card) total += card.history.length;
                    });
                    html += `<div class="category-box">`;
                    html +=
                        `<span class="category-label" data-category="${cat.category}" data-pool="${pool}" data-ids='${JSON.stringify(ids)}'>${cat.category}<span class="total-count">总拥有 ${total} 张</span></span>`;
                    html += `<div class="card-grid">`;
                    ids.forEach(id => {
                        const card = poolCards.find(c => c.name === id);
                        const count = card ? card.history.length : 0;
                        const isOwned = count > 0;
                        html +=
                            `<div class="card-mini ${isOwned ? 'rarity-'+rarity.toLowerCase()+' owned' : 'unowned'}" data-pool="${pool}" data-id="${id}"><div class="mini-id">${id}</div><div class="mini-count">${isOwned ? '拥有 <span>'+count+'</span> 张' : '未拥有'}</div>${isOwned ? '<span class="owned-dot">●</span>' : ''}</div>`;
                    });
                    html += `</div></div>`;
                });
                html += `</div></div>`;
                return html;
            }

            function renderRaritySimple(rarity, pool, poolCards) {
                const cats = rarity === 'UR' ? UR_CATEGORIES[pool] : CARD_CATEGORIES[rarity];
                if (!cats) return '';
                const allIds = [];
                cats.forEach(c => allIds.push(...c.ids));
                // 自然排序
                const sortedIds = naturalSort(allIds);
                const ownedIds = sortedIds.filter(id => poolCards.some(c => c.name === id && c.history.length > 0));
                if (ownedIds.length === 0) return '';
                let html =
                    `<div class="rarity-group rarity-${rarity.toLowerCase()}"><div class="rarity-label">${rarity}</div><div class="category-row">`;
                ownedIds.forEach(id => {
                    const card = poolCards.find(c => c.name === id);
                    const count = card ? card.history.length : 0;
                    html +=
                        `<div class="card-mini rarity-${rarity.toLowerCase()} owned" data-pool="${pool}" data-id="${id}"><div class="mini-id">${id}</div><div class="mini-count">拥有 <span>${count}</span> 张</div><span class="owned-dot">●</span></div>`;
                });
                html += `</div></div>`;
                return html;
            }

            function bindCardEvents(hasCategories) {
                document.querySelectorAll('.card-mini').forEach(el => {
                    el.addEventListener('click', function() {
                        const pool = this.dataset.pool;
                        const id = this.dataset.id;
                        const card = appData.cards.find(c => c.pool === pool && c.name === id);
                        showDetail(pool, id, card);
                    });
                });
                if (hasCategories) {
                    document.querySelectorAll('.category-label').forEach(el => {
                        el.addEventListener('click', function(e) {
                            e.stopPropagation();
                            const cat = this.dataset.category;
                            const pool = this.dataset.pool;
                            const ids = JSON.parse(this.dataset.ids);
                            showCatPhotos(cat, ids, pool);
                        });
                    });
                }
            }

            function render() {
                renderStats();

                if (currentView === 'all') {
                    poolStatsContainer.style.display = 'none';
                    const pools = ['A', 'B'];
                    const labels = { A: 'A卡池-兔兔池', B: 'B卡池-猫猫池' };
                    let html = '';
                    pools.forEach(pool => {
                        const poolCards = appData.cards.filter(c => c.pool === pool);
                        html += `<div class="pool-section"><div class="pool-section-title">${labels[pool]}</div>`;
                        html += renderRarityWithCats('UR', pool, poolCards);
                        const sorted = Object.keys(CARD_CATEGORIES).sort((a, b) => RARITY_ORDER[a] - RARITY_ORDER[b]);
                        html += `<div class="rarity-groups-flow">${sorted.map(r => renderRarityWithCats(r, pool, poolCards)).join('')}</div>`;
                        html += `</div>`;
                    });
                    cardList.innerHTML = html || '<div class="empty-state">还没有卡牌，点击「新增抽卡」开始记录！</div>';
                    bindCardEvents(true);
                } else {
                    // 单卡池视图：显示统计 + 卡牌
                    renderPoolStats(currentView);
                    const poolCards = appData.cards.filter(c => c.pool === currentView);
                    if (poolCards.length === 0) {
                        cardList.innerHTML = '<div class="empty-state">这个卡池还没有卡牌，开始记录吧！</div>';
                        return;
                    }
                    const label = currentView === 'A' ? 'A卡池-兔兔池' : 'B卡池-猫猫池';
                    let html = `<div class="pool-section"><div class="pool-section-title">${label}</div>`;
                    html += renderRaritySimple('UR', currentView, poolCards);
                    const sorted = Object.keys(CARD_CATEGORIES).sort((a, b) => RARITY_ORDER[a] - RARITY_ORDER[b]);
                    html += `<div class="rarity-groups-flow">${sorted.map(r => renderRaritySimple(r, currentView, poolCards)).join('')}</div>`;
                    html += `</div>`;
                    cardList.innerHTML = html;
                    bindCardEvents(false);
                }
            }

            // ---------- 弹窗控制 ----------
            function showModal(id) { document.getElementById(id).classList.add('active'); }

            function hideModal(id) { document.getElementById(id).classList.remove('active'); }

            function showDetail(pool, id, card) {
                const rarity = getRarity(id);
                document.getElementById('detailImage').src = getCardImg(pool, id);
                document.getElementById('detailName').textContent = `${pool}池 · ${id}`;
                document.getElementById('detailRarity').textContent = `稀有度：${rarity} ｜ ${card ? '共抽到 '+card.history.length+' 次' : '尚未抽到'}`;
                const historyDiv = document.getElementById('detailHistory');
                if (card && card.history.length) {
                    const groups = {};
                    card.history.forEach(h => {
                        if (!groups[h.time]) groups[h.time] = { time: h.time, indices: [] };
                        groups[h.time].indices.push(h.globalIndex);
                    });
                    const keys = Object.keys(groups).sort((a, b) => new Date(a) - new Date(b));
                    let html = '';
                    keys.forEach((key, i) => {
                        const g = groups[key];
                        g.indices.sort((a, b) => a - b);
                        html +=
                            `<div class="batch-group"><div class="batch-title">第 ${i+1} 批</div><div class="batch-time">⏰ ${new Date(key).toLocaleString('zh-CN')}</div><div class="batch-index-list">${g.indices.map(idx => `<span class="idx-item">第${idx}抽</span>`).join('')}</div></div>`;
                    });
                    historyDiv.innerHTML = html;
                } else {
                    historyDiv.innerHTML = '<div style="color:#999;">还没有抽到这张卡</div>';
                }
                showModal('detailModal');
            }

            function showCatPhotos(category, ids, pool) {
                document.getElementById('categoryModalTitle').textContent = `${pool}池 · ${category}`;
                const imgSrc = getCatImg(pool, ids[0]);
                document.getElementById('categoryGrid').innerHTML = `
                    <div>
                        <img class="cat-img" src="${imgSrc}" alt="${category}" onerror="this.style.display='none'" />
                        <div class="cat-label">${category}</div>
                        <div style="font-size:11px;color:#999;">编号：${ids.join('、')}</div>
                    </div>
                `;
                showModal('categoryModal');
            }

            // ---------- 新增抽卡：输入框支持 ----------
            const slotList = $('#slotList');
            const modalPullCount = $('#modalPullCount');

            // 生成datalist选项（全局共享）
            function buildDatalist() {
                const dl = document.createElement('datalist');
                dl.id = 'cardOptions';
                VALID_IDS.forEach(id => {
                    const opt = document.createElement('option');
                    opt.value = id;
                    dl.appendChild(opt);
                });
                // 如果已存在则替换
                const old = document.getElementById('cardOptions');
                if (old) old.remove();
                document.body.appendChild(dl);
                return dl;
            }
            buildDatalist();

            function renderSlots(count) {
                let html = '';
                for (let i = 0; i < count; i++) {
                    html += `
                        <div class="slot-row">
                            <span class="slot-index">#${i+1}</span>
                            <input type="text" class="slot-input" list="cardOptions" placeholder="输入卡牌ID" autocomplete="off" spellcheck="false" />
                            <span class="slot-hint">⏎</span>
                        </div>
                    `;
                }
                slotList.innerHTML = html;
                // 为每个输入框绑定事件：实时校验
                slotList.querySelectorAll('.slot-input').forEach(inp => {
                    inp.addEventListener('input', function() {
                        validateSlot(this);
                    });
                    inp.addEventListener('blur', function() {
                        validateSlot(this);
                    });
                    inp.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            validateSlot(this);
                            // 自动跳到下一个输入框
                            const all = slotList.querySelectorAll('.slot-input');
                            const idx = Array.from(all).indexOf(this);
                            if (idx < all.length - 1) {
                                all[idx + 1].focus();
                            } else {
                                document.getElementById('submitPull').focus();
                            }
                        }
                    });
                });
            }

            function validateSlot(input) {
                const val = input.value.trim();
                if (!val) {
                    input.classList.remove('valid', 'invalid');
                    const hint = input.parentElement.querySelector('.slot-hint');
                    if (hint) { hint.textContent = '⏎';
                        hint.className = 'slot-hint'; }
                    return false;
                }
                const normalized = normalizeId(val);
                if (normalized) {
                    input.classList.remove('invalid');
                    input.classList.add('valid');
                    // 自动修正大小写（显示为标准形式）
                    if (input.value !== normalized) {
                        input.value = normalized;
                    }
                    const hint = input.parentElement.querySelector('.slot-hint');
                    if (hint) { hint.textContent = '✓';
                        hint.className = 'slot-hint ok'; }
                    return true;
                } else {
                    input.classList.remove('valid');
                    input.classList.add('invalid');
                    const hint = input.parentElement.querySelector('.slot-hint');
                    if (hint) { hint.textContent = '✗';
                        hint.className = 'slot-hint err'; }
                    return false;
                }
            }

            function getSlotValues() {
                const inputs = slotList.querySelectorAll('.slot-input');
                const values = [];
                let allValid = true;
                inputs.forEach(inp => {
                    const val = inp.value.trim();
                    if (!val) { allValid = false;
                        values.push(null); return; }
                    const norm = normalizeId(val);
                    if (norm) {
                        values.push(norm);
                    } else {
                        allValid = false;
                        values.push(null);
                    }
                });
                return { values, allValid };
            }

            // ---------- 新增抽卡弹窗逻辑 ----------
            function setTimeMode(mode) {
                document.querySelectorAll('.time-mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode ===
                mode));
                const input = $('#customTimeInput');
                input.style.display = mode === 'custom' ? 'block' : 'none';
                if (mode === 'custom' && !input.value) {
                    const now = new Date();
                    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                    input.value = now.toISOString().slice(0, 16);
                }
            }

            function openAddModal() {
                showModal('addModal');
                document.getElementById('modalMessage').textContent = '';
                const count = parseInt(modalPullCount.value, 10) || 1;
                renderSlots(count);
                setTimeMode('now');
                modalPullCount.onchange = () => {
                    let v = parseInt(modalPullCount.value, 10) || 1;
                    if (v < 1) v = 1;
                    if (v > 99) v = 99;
                    modalPullCount.value = v;
                    renderSlots(v);
                };
                // 聚焦第一个输入框
                setTimeout(() => {
                    const first = slotList.querySelector('.slot-input');
                    if (first) first.focus();
                }, 100);
            }

            function submitPull() {
                const pool = modalPool.value;
                const { values, allValid } = getSlotValues();
                const filtered = values.filter(v => v !== null);

                if (filtered.length === 0) {
                    document.getElementById('modalMessage').textContent = '请至少输入一张有效卡牌！';
                    return;
                }
                if (!allValid) {
                    document.getElementById('modalMessage').textContent = '存在无效的卡牌ID，请修正！';
                    return;
                }

                // 检查是否有重复的卡牌ID（同一批中）
                const dupCheck = new Set();
                for (const v of filtered) {
                    if (dupCheck.has(v)) {
                        document.getElementById('modalMessage').textContent = `同一批中不能重复添加相同的卡牌（${v}）！`;
                        return;
                    }
                    dupCheck.add(v);
                }

                const timeMode = document.querySelector('.time-mode-btn.active').dataset.mode;
                let recordTime = new Date().toISOString();
                if (timeMode === 'custom') {
                    const val = $('#customTimeInput').value;
                    if (!val) { document.getElementById('modalMessage').textContent = '请选择自定义时间！'; return; }
                    recordTime = new Date(val).toISOString();
                }

                let globalIdx = totalPulls();
                filtered.forEach(name => {
                    globalIdx++;
                    const existing = appData.cards.find(c => c.pool === pool && c.name === name);
                    if (existing) {
                        existing.history.push({ time: recordTime, globalIndex: globalIdx });
                        existing.count = existing.history.length;
                    } else {
                        appData.cards.push({
                            id: Date.now() + Math.random().toString(36),
                            pool,
                            name,
                            history: [{ time: recordTime, globalIndex: globalIdx }],
                            count: 1
                        });
                    }
                });

                saveData();
                hideModal('addModal');
                render();
                alert(`✅ 成功记录 ${filtered.length} 张卡牌！`);
            }

            // ---------- 清空 ----------
            function clearAll() {
                if (totalPulls() === 0) { alert('没有数据需要清空'); return; }
                if (confirm('确定清空所有卡牌记录吗？')) {
                    appData.cards = [];
                    saveData();
                    render();
                }
            }

            // ---------- 事件绑定 ----------
            // 池切换
            document.querySelectorAll('.pool-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.pool-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentView = this.dataset.pool;
                    render();
                });
            });

            document.getElementById('openAddModal').addEventListener('click', openAddModal);
            document.getElementById('closeAddModalBtn').addEventListener('click', () => hideModal('addModal'));
            document.getElementById('cancelAddBtn').addEventListener('click', () => hideModal('addModal'));
            document.getElementById('addModal').addEventListener('click', e => { if (e.target.id === 'addModal') hideModal(
                    'addModal'); });

            document.getElementById('timeModeGroup').addEventListener('click', e => {
                const btn = e.target.closest('.time-mode-btn');
                if (btn) setTimeMode(btn.dataset.mode);
            });

            modalPullCount.addEventListener('input', function() {
                let v = parseInt(this.value) || 1;
                if (v < 1) v = 1;
                if (v > 99) v = 99;
                this.value = v;
                renderSlots(v);
            });

            document.getElementById('submitPull').addEventListener('click', submitPull);

            document.getElementById('closeDetailBtn').addEventListener('click', () => hideModal('detailModal'));
            document.getElementById('detailModal').addEventListener('click', e => { if (e.target.id === 'detailModal')
                    hideModal('detailModal'); });

            document.getElementById('closeCategoryBtn').addEventListener('click', () => hideModal('categoryModal'));
            document.getElementById('categoryModal').addEventListener('click', e => { if (e.target.id === 'categoryModal')
                    hideModal('categoryModal'); });

            document.getElementById('clearAllBtn').addEventListener('click', clearAll);

            // ---------- 初始化 ----------
            loadData();
            render();

            // 暴露给全局方便调试
            window.__app = { appData, render, VALID_IDS };

        })();
    </script>
</body>
</html>
