<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>10周年抽抽乐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'PingFang SC', Roboto, sans-serif;
            background: #FFFACD; padding: 20px 30px; min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .main-title { font-size: 42px; font-weight: 900; text-align: center; color: #5BA3D9; padding: 10px 0 24px; letter-spacing: 3px; }
        .stats-wrapper { background: rgba(255,255,255,0.8); border-radius: 20px; padding: 18px 24px; margin-bottom: 28px; border: 1px solid rgba(255,255,255,0.5); }
        .stats-row { display: grid; grid-template-columns: repeat(6,1fr); gap: 12px; }
        .stat-card { background: rgba(255,255,255,0.5); border-radius: 14px; padding: 14px 8px; text-align: center; }
        .stat-card .label { font-size: 14px; font-weight: 600; color: #888; }
        .stat-card .value { font-size: 30px; font-weight: 800; margin-top: 2px; }
        .stat-card .percent { font-size: 12px; color: #aaa; }
        .stat-ur .value { color: #E91E63; } .stat-sp .value { color: #E74C3C; } .stat-ssr .value { color: #d4a017; } .stat-sr .value { color: #9B59B6; } .stat-r .value { color: #5B8DD9; } .stat-total .value { color: #5BA3D9; }
        .pool-tabs { display: flex; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
        .pool-tab { padding: 10px 34px; border-radius: 40px; border: 2px solid #c0dce8; background: #fff; font-weight: 700; font-size: 18px; cursor: pointer; color: #555; transition: all 0.15s; }
        .pool-tab.active { border-color: #5BA3D9; background: #5BA3D9; color: #fff; box-shadow: 0 4px 16px rgba(91,163,217,0.3); }
        .pool-tab:hover:not(.active) { border-color: #7EC8E3; background: #f8fcff; }
        .toolbar { display: flex; gap: 12px; margin: 6px 0 18px; flex-wrap: wrap; }
        .btn { padding: 10px 28px; border-radius: 40px; border: none; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.15s; }
        .btn-primary { background: linear-gradient(135deg,#5BA3D9,#89CFF0); color: #fff; box-shadow: 0 4px 16px rgba(91,163,217,0.25); }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-danger { background: #fff; border: 2px solid #f0e6ed; color: #c0392b; }
        .btn-danger:hover { background: #fef6f5; }

        .pool-section { margin-bottom: 28px; border-radius: 20px; padding: 20px; background: #fefef9; }
        .pool-section-title { font-size: 26px; font-weight: 800; color: #5a4a3a; padding-bottom: 6px; margin-bottom: 16px; border-bottom: none; }

        .rarity-groups-flow { display: flex; flex-wrap: wrap; gap: 20px 28px; align-items: flex-start; }
        .rarity-group { flex: 0 1 auto; }
        .rarity-label { font-size: 18px; font-weight: 700; display: inline-block; margin-bottom: 8px; padding: 4px 18px; border-radius: 12px; background: #f5efe2; color: #5a4a3a; }
        .rarity-ur .rarity-label { background: #fce4ec; color: #b34159; }
        .rarity-sp .rarity-label { background: #ffeaea; color: #b83a2a; }
        .rarity-ssr .rarity-label { background: #fef6e0; color: #8a6914; }
        .rarity-sr .rarity-label { background: #f3e8f7; color: #7b4a8c; }
        .rarity-r .rarity-label { background: #e8f0fe; color: #4a6fa5; }

        .category-row { display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: flex-start; }
        .category-box { background: rgba(255,255,255,0.7); border: 2px solid #e0d6c2; border-radius: 16px; padding: 10px 12px; display: flex; flex-direction: column; align-items: center; gap: 6px; width: fit-content; min-width: 130px; max-width: 100%; flex: 0 0 auto; }
        .category-box .category-label { font-size: 16px; font-weight: 700; color: #5a4a3a; cursor: pointer; padding: 2px 10px; border-radius: 8px; background: rgba(255,255,255,0.6); white-space: nowrap; display: flex; flex-direction: column; align-items: center; line-height: 1.3; width: auto; }
        .category-label:hover { background: rgba(91,163,217,0.15); }
        .category-box .category-label .total-count { font-size: 12px; font-weight: 600; color: #8b7355; }
        .category-box .card-grid { display: flex; flex-wrap: wrap; gap: 8px 10px; justify-content: center; width: 100%; }

        .card-mini {
            width: 90px; flex: 0 0 90px; background: #fff; border-radius: 10px; padding: 8px 8px; text-align: center;
            cursor: pointer; transition: all 0.15s; border: 2px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }
        .card-mini:active { transform: scale(0.95); }
        .card-mini .mini-id { font-weight: 700; font-size: 17px; color: #333; white-space: nowrap; }
        .card-mini .mini-count { font-size: 11px; color: #999; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
        .card-mini .mini-count span { font-weight: 700; color: #8b7355; }
        .card-mini.unowned { opacity: 0.4; filter: grayscale(0.5); }
        .card-mini .owned-dot { display: inline-block; margin-left: 2px; font-size: 10px; color: #c9a87c; }
        .card-mini.rarity-ur { border-color: #E91E63; } .card-mini.rarity-sp { border-color: #E74C3C; } .card-mini.rarity-ssr { border-color: #d4a017; } .card-mini.rarity-sr { border-color: #9B59B6; } .card-mini.rarity-r { border-color: #5B8DD9; }
        .card-mini.unowned { border-color: #ddd !important; }
        .card-mini.rarity-ur.owned { background: #ffe6ec; } .card-mini.rarity-sp.owned { background: #ffeaea; } .card-mini.rarity-ssr.owned { background: #fef6e0; } .card-mini.rarity-sr.owned { background: #f3e8f7; } .card-mini.rarity-r.owned { background: #e8f0fe; }

        .empty-state { text-align: center; padding: 40px 20px; color: #ccc; font-size: 18px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; padding: 16px; }
        .modal-overlay.active { display: flex; }
        .modal { background: #fff; border-radius: 24px; max-width: 680px; width: 100%; max-height: 92vh; overflow-y: auto; padding: 24px 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        .modal h2 { font-size: 22px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .modal .close-btn { margin-left: auto; background: none; border: none; font-size: 26px; cursor: pointer; color: #aaa; padding: 0 6px; }
        .modal .close-btn:active { color: #555; }
        .modal .form-group { margin-bottom: 14px; }
        .modal .form-group label { font-weight: 600; display: block; margin-bottom: 3px; font-size: 13px; color: #555; }
        .modal .form-group select, .modal .form-group input[type="number"], .modal .form-group input[type="datetime-local"] { width: 100%; padding: 8px 12px; border-radius: 10px; border: 2px solid #e0dceb; font-size: 14px; outline: none; background: #fff; }
        .modal .form-group select:focus, .modal .form-group input:focus { border-color: #5BA3D9; }
        .time-mode-group { display: flex; gap: 8px; margin-bottom: 8px; }
        .time-mode-btn { padding: 5px 16px; border-radius: 24px; border: 2px solid #ddd; background: #fff; font-weight: 600; font-size: 13px; cursor: pointer; color: #555; flex: 1; text-align: center; }
        .time-mode-btn.active { border-color: #5BA3D9; background: #5BA3D9; color: #fff; }
        .slot-list { display: flex; flex-direction: column; gap: 8px; margin: 8px 0 14px; max-height: 300px; overflow-y: auto; padding-right: 4px; }
        .slot-row { display: flex; flex-wrap: wrap; gap: 6px 10px; align-items: center; background: #f8f6fc; padding: 8px 12px; border-radius: 12px; border: 1px solid #edeaf3; }
        .slot-row .slot-index { font-weight: 700; color: #888; min-width: 34px; font-size: 13px; }
        .slot-row select { flex: 2 1 160px; padding: 6px 10px; border-radius: 8px; border: 2px solid #e0dceb; font-size: 13px; background: #fff; outline: none; }
        .slot-row select:focus { border-color: #5BA3D9; }
        .modal .btn-group { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
        .modal .btn-group .btn { flex: 1 1 auto; justify-content: center; }
        #modalMessage { margin-top: 10px; color: #e74c3c; font-size: 13px; font-weight: 600; }

        #detailModal .modal { max-width: 460px; text-align: center; }
        #detailImage { max-width: 100%; max-height: 50vh; border-radius: 14px; margin-top: 6px; background: #f0ecf7; border: 1px solid #edeaf3; }
        #detailName { margin-top: 12px; font-weight: 700; font-size: 22px; }
        #detailRarity { margin-top: 3px; font-size: 15px; color: #888; }
        #detailHistory { margin-top: 10px; text-align: left; font-size: 13px; color: #555; max-height: 180px; overflow-y: auto; background: #f8f6fc; padding: 8px 12px; border-radius: 10px; border: 1px solid #edeaf3; }
        .batch-group { margin-bottom: 4px; border-bottom: 1px dashed #ddd; padding-bottom: 3px; }
        .batch-group:last-child { border-bottom: none; margin-bottom: 0; }
        .batch-title { font-weight: 700; color: #5BA3D9; font-size: 13px; }
        .batch-time { font-size: 11px; color: #999; }
        .batch-index-list { font-size: 12px; color: #555; padding-left: 4px; }
        .batch-index-list .idx-item { display: inline-block; margin-right: 4px; background: rgba(91,163,217,0.08); padding: 0 6px; border-radius: 4px; }

        .footer-actions { margin-top: 24px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #edeaf3; padding-top: 14px; flex-wrap: wrap; }

        .category-modal .modal { max-width: 520px; }
        .category-grid { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .category-grid .cat-img { width: 200px; max-width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; background: #f0ecf7; border: 1px solid #edeaf3; }
        .category-grid .cat-label { font-size: 14px; text-align: center; font-weight: 600; color: #555; margin-top: 4px; }

        @media (max-width: 900px) {
            body { padding: 14px 16px; }
            .stats-row { grid-template-columns: repeat(3,1fr); gap: 8px; }
            .main-title { font-size: 32px; }
            .pool-tab { font-size: 15px; padding: 8px 20px; }
            .pool-section-title { font-size: 22px; }
            .card-mini { width: 78px; flex: 0 0 78px; padding: 6px 6px; }
            .card-mini .mini-id { font-size: 15px; }
        }
        @media (max-width: 600px) {
            body { padding: 10px 12px; }
            .stats-row { grid-template-columns: repeat(2,1fr); gap: 6px; }
            .stat-card .value { font-size: 24px; }
            .main-title { font-size: 26px; }
            .pool-tab { font-size: 13px; padding: 6px 14px; }
            .pool-section-title { font-size: 18px; }
            .card-mini { width: 68px; flex: 0 0 68px; padding: 5px 4px; }
            .card-mini .mini-id { font-size: 14px; }
            .modal { padding: 14px; }
            .modal h2 { font-size: 18px; }
            .category-grid .cat-img { width: 150px; }
        }
        @media (max-width: 400px) {
            .card-mini { width: 60px; flex: 0 0 60px; padding: 4px 3px; }
            .card-mini .mini-id { font-size: 13px; }
        }
        .slot-list::-webkit-scrollbar { width: 4px; }
        .slot-list::-webkit-scrollbar-thumb { background: #d5cee8; border-radius: 8px; }
        .slot-list::-webkit-scrollbar-track { background: #f0ecf7; }
    </style>
</head>
<body>
<div class="container">
    <div class="main-title">10周年抽抽乐</div>

    <div class="stats-wrapper">
        <div class="stats-row" id="statsRow">
            <div class="stat-card stat-total"><div class="label">总抽数</div><div class="value" id="statTotal">0</div><div class="percent" id="statTotalPct">100%</div></div>
            <div class="stat-card stat-ur"><div class="label">UR</div><div class="value" id="statUR">0</div><div class="percent" id="statURPct">0%</div></div>
            <div class="stat-card stat-sp"><div class="label">SP</div><div class="value" id="statSP">0</div><div class="percent" id="statSPPct">0%</div></div>
            <div class="stat-card stat-ssr"><div class="label">SSR</div><div class="value" id="statSSR">0</div><div class="percent" id="statSSRPct">0%</div></div>
            <div class="stat-card stat-sr"><div class="label">SR</div><div class="value" id="statSR">0</div><div class="percent" id="statSRPct">0%</div></div>
            <div class="stat-card stat-r"><div class="label">R</div><div class="value" id="statR">0</div><div class="percent" id="statRPct">0%</div></div>
        </div>
    </div>

    <div class="pool-tabs">
        <button class="pool-tab active" data-pool="all">📋 全部</button>
        <button class="pool-tab" data-pool="A">A卡池-兔兔池</button>
        <button class="pool-tab" data-pool="B">B卡池-猫猫池</button>
    </div>

    <div class="toolbar">
        <button class="btn btn-primary" id="openAddModal">➕ 新增抽卡</button>
    </div>

    <div id="cardList">
        <div class="empty-state">还没有卡牌，点击「新增抽卡」开始记录！</div>
    </div>

    <div class="footer-actions">
        <button class="btn btn-danger" id="clearAllBtn">🗑️ 清空所有卡牌</button>
    </div>

    <!-- 新增抽卡弹窗 -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h2>📥 新增抽卡记录 <button class="close-btn" id="closeAddModalBtn">✕</button></h2>
            <div class="form-group"><label>选择卡池</label><select id="modalPool"><option value="A">A卡池-兔兔池</option><option value="B">B卡池-猫猫池</option></select></div>
            <div class="form-group"><label>抽数</label><input type="number" id="modalPullCount" value="5" min="1" max="99" /></div>
            <div class="form-group"><label>⏰ 时间模式</label>
                <div class="time-mode-group" id="timeModeGroup">
                    <button class="time-mode-btn active" data-mode="now">当前时间</button>
                    <button class="time-mode-btn" data-mode="custom">自定义时间</button>
                </div>
                <input type="datetime-local" id="customTimeInput" style="display:none; margin-top:6px;" />
            </div>
            <div class="form-group"><label>每一抽的卡牌</label><div class="slot-list" id="slotList"></div></div>
            <div class="btn-group">
                <button class="btn btn-primary" id="submitPull">✅ 确认添加</button>
                <button class="btn btn-danger" id="cancelAddBtn">取消</button>
            </div>
            <div id="modalMessage"></div>
        </div>
    </div>

    <!-- 卡牌详情弹窗 -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <button class="close-btn" id="closeDetailBtn">✕</button>
            <img id="detailImage" src="" alt="卡牌图片" style="display:block; margin: 0 auto;" />
            <div id="detailName" style="margin-top:12px;"></div>
            <div id="detailRarity" style="margin-top:4px;"></div>
            <div id="detailHistory" style="margin-top:8px;"></div>
        </div>
    </div>

    <!-- 分类照片弹窗 -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal" style="max-width:520px;">
            <h2>📸 <span id="categoryModalTitle">分类名称</span><button class="close-btn" id="closeCategoryBtn">✕</button></h2>
            <div class="category-grid" id="categoryGrid"></div>
        </div>
    </div>
</div>

<script>
(function() {
    const STORAGE_KEY = 'tenniversary_cards_v12';

    // 数据定义
    const CARD_CATEGORIES = {
        'R': [
            { category: '写真卡', ids: ['r1','r2','r3','r4'] },
            { category: '活动卡', ids: ['r5','r6','r7','r8'] },
            { category: '横卡', ids: ['r9','r10','r11','r12'] }
        ],
        'SR': [
            { category: '背影卡', ids: ['sr1','sr2'] },
            { category: '宠物卡', ids: ['sr3','sr4','sr5','sr6'] },
            { category: '拼字卡', ids: ['sr7','sr8','sr9','sr10'] },
            { category: '童年卡', ids: ['sr11'] }
        ],
        'SSR': [
            { category: '搞怪卡', ids: ['ssr1','ssr2','ssr3'] },
            { category: '古风卡', ids: ['ssr4','ssr5'] },
            { category: '早期卡', ids: ['ssr6','ssr7','ssr8'] }
        ],
        'SP': [
            { category: '手写卡', ids: ['sp1','sp2','sp3','sp4'] },
            { category: '连环画卡', ids: ['sp5','sp6'] }
        ]
    };
    const UR_CATEGORIES = {
        'A': [
            { category: '兔兔卡套', ids: ['ur1'] },
            { category: '兔娃娃', ids: ['ur2'] },
            { category: '施华蔻洗发水', ids: ['ur3'] },
            { category: '星期六洞洞鞋', ids: ['ur4'] },
            { category: '签名照', ids: ['ur5'] }
        ],
        'B': [
            { category: '猫猫卡套', ids: ['ur1'] },
            { category: '猫娃娃', ids: ['ur2'] },
            { category: '施华蔻洗发水', ids: ['ur3'] },
            { category: '星期六洞洞鞋', ids: ['ur4'] },
            { category: '签名照', ids: ['ur5'] }
        ]
    };
    const RARITY_ORDER = { 'UR':0, 'SP':1, 'SSR':2, 'SR':3, 'R':4 };

    // 工具函数
    const getRarity = id => {
        if (id.startsWith('ur')) return 'UR';
        for (const [r, cats] of Object.entries(CARD_CATEGORIES)) {
            if (cats.some(c => c.ids.includes(id))) return r;
        }
        return 'R';
    };
    const getCategory = (id, pool) => {
        if (id.startsWith('ur')) {
            const arr = UR_CATEGORIES[pool] || [];
            const found = arr.find(c => c.ids.includes(id));
            return found ? found.category : 'UR';
        }
        for (const cats of Object.values(CARD_CATEGORIES)) {
            const found = cats.find(c => c.ids.includes(id));
            if (found) return found.category;
        }
        return id;
    };
    const getCardImg = (pool, id) => `./images/${pool}_${id}.png`;
    const getCatImg = (pool, id) => {
        if (id.startsWith('ur')) return getCardImg(pool, id);
        return `./images/${pool}_${getCategory(id, pool)}.png`;
    };

    // 数据加载
    let appData = { cards: [] };
    let currentView = 'all';

    const loadData = () => {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                if (parsed && Array.isArray(parsed.cards)) {
                    parsed.cards.forEach(c => {
                        if (!Array.isArray(c.history)) {
                            c.history = [];
                            for (let i=0; i<(c.count||0); i++) c.history.push({ time: new Date().toISOString(), globalIndex: 0 });
                        }
                        c.count = c.history.length;
                    });
                    appData = parsed;
                    return;
                }
            }
        } catch (e) { console.warn('数据读取失败，已重置'); }
        appData = { cards: [] };
    };
    const saveData = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    const totalPulls = () => appData.cards.reduce((sum, c) => sum + c.history.length, 0);

    // DOM 元素
    const $ = s => document.querySelector(s);
    const poolTabs = document.querySelectorAll('.pool-tab');
    const cardList = $('#cardList');
    const stats = {
        total: $('#statTotal'), ur: $('#statUR'), sp: $('#statSP'), ssr: $('#statSSR'), sr: $('#statSR'), r: $('#statR'),
        totalPct: $('#statTotalPct'), urPct: $('#statURPct'), spPct: $('#statSPPct'), ssrPct: $('#statSSRPct'), srPct: $('#statSRPct'), rPct: $('#statRPct')
    };

    // 渲染统计
    const renderStats = () => {
        const counts = { UR:0, SP:0, SSR:0, SR:0, R:0 };
        let total = 0;
        appData.cards.forEach(c => {
            const r = getRarity(c.name);
            if (counts.hasOwnProperty(r)) counts[r] += c.history.length;
            total += c.history.length;
        });
        stats.total.textContent = total;
        stats.ur.textContent = counts.UR;
        stats.sp.textContent = counts.SP;
        stats.ssr.textContent = counts.SSR;
        stats.sr.textContent = counts.SR;
        stats.r.textContent = counts.R;
        const pct = n => total ? Math.round(n/total*100)+'%' : '0%';
        stats.totalPct.textContent = '100%';
        stats.urPct.textContent = pct(counts.UR);
        stats.spPct.textContent = pct(counts.SP);
        stats.ssrPct.textContent = pct(counts.SSR);
        stats.srPct.textContent = pct(counts.SR);
        stats.rPct.textContent = pct(counts.R);
    };

    // 弹窗控制
    const showModal = id => document.getElementById(id).classList.add('active');
    const hideModal = id => document.getElementById(id).classList.remove('active');

    // 详情弹窗
    const showDetail = (pool, id, card) => {
        const rarity = getRarity(id);
        document.getElementById('detailImage').src = getCardImg(pool, id);
        document.getElementById('detailName').textContent = `${pool}池 · ${id}`;
        document.getElementById('detailRarity').textContent = `稀有度：${rarity} ｜ ${card ? '共抽到 '+card.history.length+' 次' : '尚未抽到'}`;
        const historyDiv = document.getElementById('detailHistory');
        if (card && card.history.length) {
            const groups = {};
            card.history.forEach(h => {
                if (!groups[h.time]) groups[h.time] = { time: h.time, indices: [] };
                groups[h.time].indices.push(h.globalIndex);
            });
            const keys = Object.keys(groups).sort((a,b) => new Date(a)-new Date(b));
            let html = '';
            keys.forEach((key, i) => {
                const g = groups[key];
                g.indices.sort((a,b)=>a-b);
                html += `<div class="batch-group"><div class="batch-title">第 ${i+1} 批</div><div class="batch-time">⏰ ${new Date(key).toLocaleString('zh-CN')}</div><div class="batch-index-list">${g.indices.map(idx => `<span class="idx-item">第${idx}抽</span>`).join('')}</div></div>`;
            });
            historyDiv.innerHTML = html;
        } else {
            historyDiv.innerHTML = '<div style="color:#999;">还没有抽到这张卡</div>';
        }
        showModal('detailModal');
    };

    // 分类照片弹窗
    const showCatPhotos = (category, ids, pool) => {
        document.getElementById('categoryModalTitle').textContent = `${pool}池 · ${category}`;
        const imgSrc = getCatImg(pool, ids[0]);
        document.getElementById('categoryGrid').innerHTML = `
            <div>
                <img class="cat-img" src="${imgSrc}" alt="${category}" onerror="this.style.display='none'" />
                <div class="cat-label">${category}</div>
                <div style="font-size:11px;color:#999;">编号：${ids.join('、')}</div>
            </div>
        `;
        showModal('categoryModal');
    };

    // 构建单个稀有度区块（带分类标签，用于全部视图）
    const renderRarityWithCats = (rarity, pool, poolCards) => {
        const cats = rarity.startsWith('ur') ? UR_CATEGORIES[pool] : CARD_CATEGORIES[rarity];
        if (!cats) return '';
        let html = `<div class="rarity-group rarity-${rarity.toLowerCase()}"><div class="rarity-label">${rarity}</div><div class="category-row">`;
        cats.forEach(cat => {
            const ids = cat.ids;
            let total = 0;
            ids.forEach(id => {
                const card = poolCards.find(c => c.name === id);
                if (card) total += card.history.length;
            });
            html += `<div class="category-box">`;
            html += `<span class="category-label" data-category="${cat.category}" data-pool="${pool}" data-ids='${JSON.stringify(ids)}'>${cat.category}<span class="total-count">总拥有 ${total} 张</span></span>`;
            html += `<div class="card-grid">`;
            ids.forEach(id => {
                const card = poolCards.find(c => c.name === id);
                const count = card ? card.history.length : 0;
                const isOwned = count > 0;
                html += `<div class="card-mini ${isOwned ? 'rarity-'+rarity.toLowerCase()+' owned' : 'unowned'}" data-pool="${pool}" data-id="${id}"><div class="mini-id">${id}</div><div class="mini-count">${isOwned ? '拥有 <span>'+count+'</span> 张' : '未拥有'}</div>${isOwned ? '<span class="owned-dot">●</span>' : ''}</div>`;
            });
            html += `</div></div>`;
        });
        html += `</div></div>`;
        return html;
    };

    // 构建单个稀有度区块（无分类标签，用于单卡池视图）
    const renderRaritySimple = (rarity, pool, poolCards) => {
        const cats = rarity.startsWith('ur') ? UR_CATEGORIES[pool] : CARD_CATEGORIES[rarity];
        if (!cats) return '';
        const allIds = [];
        cats.forEach(c => allIds.push(...c.ids));
        allIds.sort();
        let html = `<div class="rarity-group rarity-${rarity.toLowerCase()}"><div class="rarity-label">${rarity}</div><div class="category-row">`;
        allIds.forEach(id => {
            const card = poolCards.find(c => c.name === id);
            const count = card ? card.history.length : 0;
            const isOwned = count > 0;
            html += `<div class="card-mini ${isOwned ? 'rarity-'+rarity.toLowerCase()+' owned' : 'unowned'}" data-pool="${pool}" data-id="${id}"><div class="mini-id">${id}</div><div class="mini-count">${isOwned ? '拥有 <span>'+count+'</span> 张' : '未拥有'}</div>${isOwned ? '<span class="owned-dot">●</span>' : ''}</div>`;
        });
        html += `</div></div>`;
        return html;
    };

    // 绑定事件
    const bindEvents = (hasCategories) => {
        document.querySelectorAll('.card-mini').forEach(el => {
            el.addEventListener('click', function() {
                const pool = this.dataset.pool;
                const id = this.dataset.id;
                const card = appData.cards.find(c => c.pool === pool && c.name === id);
                showDetail(pool, id, card);
            });
        });
        if (hasCategories) {
            document.querySelectorAll('.category-label').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const cat = this.dataset.category;
                    const pool = this.dataset.pool;
                    const ids = JSON.parse(this.dataset.ids);
                    showCatPhotos(cat, ids, pool);
                });
            });
        }
    };

    // 主渲染
    const render = () => {
        renderStats();
        if (currentView === 'all') {
            const pools = ['A', 'B'];
            const labels = { A:'A卡池-兔兔池', B:'B卡池-猫猫池' };
            let html = '';
            pools.forEach(pool => {
                const poolCards = appData.cards.filter(c => c.pool === pool);
                html += `<div class="pool-section"><div class="pool-section-title">${labels[pool]}</div>`;
                html += renderRarityWithCats('UR', pool, poolCards);
                const sorted = Object.keys(CARD_CATEGORIES).sort((a,b) => RARITY_ORDER[a] - RARITY_ORDER[b]);
                html += `<div class="rarity-groups-flow">${sorted.map(r => renderRarityWithCats(r, pool, poolCards)).join('')}</div>`;
                html += `</div>`;
            });
            cardList.innerHTML = html || '<div class="empty-state">还没有卡牌，点击「新增抽卡」开始记录！</div>';
            bindEvents(true);
        } else {
            const poolCards = appData.cards.filter(c => c.pool === currentView);
            if (poolCards.length === 0) {
                cardList.innerHTML = '<div class="empty-state">这个卡池还没有卡牌，开始记录吧！</div>';
                return;
            }
            const label = currentView === 'A' ? 'A卡池-兔兔池' : 'B卡池-猫猫池';
            let html = `<div class="pool-section"><div class="pool-section-title">${label}</div>`;
            html += renderRaritySimple('UR', currentView, poolCards);
            const sorted = Object.keys(CARD_CATEGORIES).sort((a,b) => RARITY_ORDER[a] - RARITY_ORDER[b]);
            html += `<div class="rarity-groups-flow">${sorted.map(r => renderRaritySimple(r, currentView, poolCards)).join('')}</div>`;
            html += `</div>`;
            cardList.innerHTML = html;
            bindEvents(false);
        }
    };

    // 新增抽卡弹窗相关
    const slotList = $('#slotList');
    const modalPullCount = $('#modalPullCount');
    const modalPool = $('#modalPool');
    const allCardIds = (() => {
        const ids = [];
        Object.values(CARD_CATEGORIES).forEach(cats => cats.forEach(c => ids.push(...c.ids)));
        for (let i=1; i<=5; i++) ids.push('ur'+i);
        return ids.sort();
    })();

    const renderSlots = (count) => {
        let html = '';
        for (let i=0; i<count; i++) {
            html += `<div class="slot-row"><span class="slot-index">#${i+1}</span><select class="slot-card">${allCardIds.map(id => `<option value="${id}">${id}</option>`).join('')}</select></div>`;
        }
        slotList.innerHTML = html;
    };

    const setTimeMode = mode => {
        document.querySelectorAll('.time-mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
        const input = $('#customTimeInput');
        input.style.display = mode === 'custom' ? 'block' : 'none';
        if (mode === 'custom' && !input.value) {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            input.value = now.toISOString().slice(0,16);
        }
    };

    const openAddModal = () => {
        showModal('addModal');
        document.getElementById('modalMessage').textContent = '';
        renderSlots(parseInt(modalPullCount.value,10) || 5);
        setTimeMode('now');
        modalPool.onchange = () => renderSlots(parseInt(modalPullCount.value,10) || 5);
    };

    const submitPull = () => {
        const pool = modalPool.value;
        const rows = document.querySelectorAll('.slot-card');
        const cardsToAdd = [];
        let hasError = false;
        rows.forEach(sel => {
            if (!sel.value) hasError = true;
            else cardsToAdd.push(sel.value);
        });
        if (hasError) {
            document.getElementById('modalMessage').textContent = '请选择所有卡牌！';
            return;
        }
        const timeMode = document.querySelector('.time-mode-btn.active').dataset.mode;
        let recordTime = new Date().toISOString();
        if (timeMode === 'custom') {
            const val = $('#customTimeInput').value;
            if (!val) { document.getElementById('modalMessage').textContent = '请选择自定义时间！'; return; }
            recordTime = new Date(val).toISOString();
        }
        let globalIdx = totalPulls();
        cardsToAdd.forEach(name => {
            globalIdx++;
            const existing = appData.cards.find(c => c.pool === pool && c.name === name);
            if (existing) {
                existing.history.push({ time: recordTime, globalIndex: globalIdx });
                existing.count = existing.history.length;
            } else {
                appData.cards.push({
                    id: Date.now() + Math.random().toString(36),
                    pool, name,
                    history: [{ time: recordTime, globalIndex: globalIdx }],
                    count: 1
                });
            }
        });
        saveData();
        hideModal('addModal');
        render();
        alert(`✅ 成功记录 ${cardsToAdd.length} 张卡牌！`);
    };

    // 清空
    const clearAll = () => {
        if (totalPulls() === 0) { alert('没有数据需要清空'); return; }
        if (confirm('确定清空所有卡牌记录吗？')) {
            appData.cards = [];
            saveData();
            render();
        }
    };

    // 初始化事件绑定
    poolTabs.forEach(tab => tab.addEventListener('click', function() {
        poolTabs.forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        currentView = this.dataset.pool;
        render();
    }));

    document.getElementById('openAddModal').addEventListener('click', openAddModal);
    document.getElementById('closeAddModalBtn').addEventListener('click', () => hideModal('addModal'));
    document.getElementById('cancelAddBtn').addEventListener('click', () => hideModal('addModal'));
    document.getElementById('addModal').addEventListener('click', e => { if (e.target.id==='addModal') hideModal('addModal'); });
    document.getElementById('timeModeGroup').addEventListener('click', e => {
        const btn = e.target.closest('.time-mode-btn');
        if (btn) setTimeMode(btn.dataset.mode);
    });
    modalPullCount.addEventListener('input', function() {
        let v = parseInt(this.value) || 1;
        if (v < 1) v = 1;
        if (v > 99) v = 99;
        this.value = v;
        renderSlots(v);
    });
    document.getElementById('submitPull').addEventListener('click', submitPull);

    // 详情弹窗关闭
    document.getElementById('closeDetailBtn').addEventListener('click', () => hideModal('detailModal'));
    document.getElementById('detailModal').addEventListener('click', e => { if (e.target.id==='detailModal') hideModal('detailModal'); });

    // 分类弹窗关闭
    document.getElementById('closeCategoryBtn').addEventListener('click', () => hideModal('categoryModal'));
    document.getElementById('categoryModal').addEventListener('click', e => { if (e.target.id==='categoryModal') hideModal('categoryModal'); });

    // 清空按钮
    document.getElementById('clearAllBtn').addEventListener('click', clearAll);

    // 启动
    loadData();
    render();
})();
</script>
</body>
</html>
