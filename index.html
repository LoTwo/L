<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>10周年抽抽乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, 'PingFang SC', Roboto, sans-serif;
            background: #FFFACD;
            padding: 20px 30px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .main-title {
            font-size: 48px;
            font-weight: 900;
            text-align: center;
            color: #5BA3D9;
            padding: 10px 0 24px;
            letter-spacing: 3px;
        }

        .stats-wrapper {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 20px 28px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 14px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            padding: 16px 8px;
            text-align: center;
        }
        .stat-card .label {
            font-size: 16px;
            font-weight: 600;
            color: #888;
        }
        .stat-card .value {
            font-size: 34px;
            font-weight: 800;
            margin-top: 2px;
        }
        .stat-card .percent {
            font-size: 13px;
            color: #aaa;
        }
        .stat-ur .value { color: #E91E63; }
        .stat-sp .value { color: #E74C3C; }
        .stat-ssr .value { color: #d4a017; }
        .stat-sr .value { color: #9B59B6; }
        .stat-r .value { color: #5B8DD9; }
        .stat-total .value { color: #5BA3D9; }

        .pool-tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .pool-tab {
            padding: 12px 38px;
            border-radius: 40px;
            border: 2px solid #c0dce8;
            background: #fff;
            font-weight: 700;
            font-size: 20px;
            cursor: pointer;
            color: #555;
            transition: all 0.15s;
        }
        .pool-tab.active {
            border-color: #5BA3D9;
            background: #5BA3D9;
            color: #fff;
            box-shadow: 0 4px 16px rgba(91, 163, 217, 0.3);
        }
        .pool-tab:hover:not(.active) {
            border-color: #7EC8E3;
            background: #f8fcff;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            margin: 6px 0 18px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 32px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #5BA3D9, #89CFF0);
            color: #fff;
            box-shadow: 0 4px 16px rgba(91, 163, 217, 0.25);
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-danger {
            background: #fff;
            border: 2px solid #f0e6ed;
            color: #c0392b;
        }
        .btn-danger:hover { background: #fef6f5; }

        .pool-section {
            margin-bottom: 32px;
        }
        .pool-section-title {
            font-size: 28px;
            font-weight: 800;
            color: #5BA3D9;
            padding-bottom: 8px;
            border-bottom: 3px solid #5BA3D9;
            margin-bottom: 18px;
        }

        .rarity-group {
            margin-bottom: 18px;
        }
        .rarity-label {
            font-size: 20px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 10px;
            padding: 0 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
        }

        /* ===== 横向排列容器 ===== */
        .category-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 24px;
            align-items: stretch;
        }

        /* ===== 分类方块 ===== */
        .category-box {
            background: rgba(255, 255, 255, 0.45);
            border-radius: 16px;
            padding: 18px 22px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 260px;
            flex: 0 0 auto;
            min-height: 140px;
        }

        .category-box .category-label {
            font-size: 18px;
            font-weight: 700;
            color: #555;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.3;
            width: 100%;
            text-align: center;
        }
        .category-box .category-label .total-count {
            font-size: 14px;
            font-weight: 600;
            color: #5BA3D9;
        }
        .category-box .category-label:hover {
            background: rgba(91, 163, 217, 0.15);
        }

        .category-box .card-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            justify-content: center;
            width: 100%;
        }

        .card-mini {
            background: #fff;
            border-radius: 10px;
            padding: 10px 16px;
            border: 2px solid #edeaf3;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            min-width: 60px;
            flex: 0 1 auto;
        }
        .card-mini:active {
            transform: scale(0.95);
        }
        .card-mini .mini-id {
            font-weight: 700;
            font-size: 17px;
            color: #333;
        }
        .card-mini .mini-count {
            font-size: 13px;
            color: #999;
            margin-top: 2px;
        }
        .card-mini .mini-count span {
            color: #5BA3D9;
            font-weight: 700;
        }
        .card-mini.unowned {
            opacity: 0.35;
            filter: grayscale(0.6);
        }
        .card-mini .owned-dot {
            display: inline-block;
            margin-left: 3px;
            font-size: 12px;
            color: #5BA3D9;
        }
        .card-mini.rarity-ur { border-color: #E91E63; }
        .card-mini.rarity-sp { border-color: #E74C3C; }
        .card-mini.rarity-ssr { border-color: #d4a017; }
        .card-mini.rarity-sr { border-color: #9B59B6; }
        .card-mini.rarity-r { border-color: #5B8DD9; }
        .card-mini.unowned { border-color: #edeaf3 !important; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #ccc;
            font-size: 18px;
        }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff;
            border-radius: 24px;
            max-width: 680px;
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            padding: 24px 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }
        .modal h2 {
            font-size: 24px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal .close-btn {
            margin-left: auto;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
            padding: 0 6px;
        }
        .modal .close-btn:active { color: #555; }
        .modal .form-group { margin-bottom: 14px; }
        .modal .form-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 3px;
            font-size: 14px;
            color: #555;
        }
        .modal .form-group select,
        .modal .form-group input[type="number"],
        .modal .form-group input[type="datetime-local"] {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid #e0dceb;
            font-size: 15px;
            outline: none;
            background: #fff;
        }
        .modal .form-group select:focus,
        .modal .form-group input:focus {
            border-color: #5BA3D9;
        }

        .time-mode-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .time-mode-btn {
            padding: 6px 18px;
            border-radius: 24px;
            border: 2px solid #ddd;
            background: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            color: #555;
            flex: 1;
            text-align: center;
        }
        .time-mode-btn.active {
            border-color: #5BA3D9;
            background: #5BA3D9;
            color: #fff;
        }

        .slot-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 8px 0 14px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .slot-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 10px;
            align-items: center;
            background: #f8f6fc;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #edeaf3;
        }
        .slot-row .slot-index {
            font-weight: 700;
            color: #888;
            min-width: 34px;
            font-size: 13px;
        }
        .slot-row select {
            flex: 2 1 160px;
            padding: 6px 10px;
            border-radius: 8px;
            border: 2px solid #e0dceb;
            font-size: 13px;
            background: #fff;
            outline: none;
        }
        .slot-row select:focus {
            border-color: #5BA3D9;
        }

        .modal .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .modal .btn-group .btn {
            flex: 1 1 auto;
            justify-content: center;
        }
        #modalMessage {
            margin-top: 10px;
            color: #e74c3c;
            font-size: 13px;
            font-weight: 600;
        }

        /* ===== 详情弹窗 ===== */
        #detailModal .modal {
            max-width: 460px;
            text-align: center;
        }
        #detailImage {
            max-width: 100%;
            max-height: 50vh;
            border-radius: 14px;
            margin-top: 6px;
            background: #f0ecf7;
            border: 1px solid #edeaf3;
        }
        #detailName {
            margin-top: 12px;
            font-weight: 700;
            font-size: 22px;
        }
        #detailRarity {
            margin-top: 3px;
            font-size: 15px;
            color: #888;
        }
        #detailHistory {
            margin-top: 10px;
            text-align: left;
            font-size: 13px;
            color: #555;
            max-height: 180px;
            overflow-y: auto;
            background: #f8f6fc;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid #edeaf3;
        }
        .batch-group {
            margin-bottom: 4px;
            border-bottom: 1px dashed #ddd;
            padding-bottom: 3px;
        }
        .batch-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .batch-title {
            font-weight: 700;
            color: #5BA3D9;
            font-size: 13px;
        }
        .batch-time {
            font-size: 11px;
            color: #999;
        }
        .batch-index-list {
            font-size: 12px;
            color: #555;
            padding-left: 4px;
        }
        .batch-index-list .idx-item {
            display: inline-block;
            margin-right: 4px;
            background: rgba(91, 163, 217, 0.08);
            padding: 0 6px;
            border-radius: 4px;
        }

        .footer-actions {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            border-top: 1px solid #edeaf3;
            padding-top: 14px;
            flex-wrap: wrap;
        }

        /* ===== 分类照片弹窗（仅非UR使用） ===== */
        .category-modal .modal {
            max-width: 520px;
        }
        .category-grid {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .category-grid .cat-img {
            width: 220px;
            max-width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 10px;
            background: #f0ecf7;
            border: 1px solid #edeaf3;
        }
        .category-grid .cat-label {
            font-size: 14px;
            text-align: center;
            font-weight: 600;
            color: #555;
            margin-top: 4px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 900px) {
            body { padding: 14px 16px; }
            .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .main-title { font-size: 34px; }
            .pool-tab { font-size: 16px; padding: 8px 20px; }
            .pool-section-title { font-size: 22px; }
            .category-box { width: 220px; padding: 14px 16px; }
            .card-mini { padding: 8px 12px; min-width: 50px; }
            .card-mini .mini-id { font-size: 15px; }
        }
        @media (max-width: 600px) {
            body { padding: 10px 12px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 6px; }
            .stat-card .value { font-size: 26px; }
            .main-title { font-size: 28px; }
            .pool-tab { font-size: 14px; padding: 6px 14px; }
            .pool-section-title { font-size: 18px; }
            .category-row { gap: 10px; }
            .category-box { width: 100%; flex: 0 0 100%; padding: 12px 14px; }
            .card-mini { padding: 6px 10px; min-width: 42px; }
            .card-mini .mini-id { font-size: 13px; }
            .card-mini .mini-count { font-size: 11px; }
            .modal { padding: 14px; }
            .modal h2 { font-size: 18px; }
            .category-grid .cat-img { width: 160px; }
        }
        @media (max-width: 400px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .category-box { padding: 8px 10px; }
            .card-mini { padding: 4px 8px; min-width: 34px; }
            .card-mini .mini-id { font-size: 11px; }
            .card-mini .mini-count { font-size: 10px; }
            .category-box .category-label { font-size: 14px; }
            .category-grid .cat-img { width: 130px; }
        }
        .slot-list::-webkit-scrollbar { width: 4px; }
        .slot-list::-webkit-scrollbar-thumb { background: #d5cee8; border-radius: 8px; }
        .slot-list::-webkit-scrollbar-track { background: #f0ecf7; }
    </style>
</head>
<body>
<div class="container">

    <div class="main-title">10周年抽抽乐</div>

    <div class="stats-wrapper">
        <div class="stats-row" id="statsRow">
            <div class="stat-card stat-total"><div class="label">总抽数</div><div class="value" id="statTotal">0</div><div class="percent" id="statTotalPct">100%</div></div>
            <div class="stat-card stat-ur"><div class="label">UR</div><div class="value" id="statUR">0</div><div class="percent" id="statURPct">0%</div></div>
            <div class="stat-card stat-sp"><div class="label">SP</div><div class="value" id="statSP">0</div><div class="percent" id="statSPPct">0%</div></div>
            <div class="stat-card stat-ssr"><div class="label">SSR</div><div class="value" id="statSSR">0</div><div class="percent" id="statSSRPct">0%</div></div>
            <div class="stat-card stat-sr"><div class="label">SR</div><div class="value" id="statSR">0</div><div class="percent" id="statSRPct">0%</div></div>
            <div class="stat-card stat-r"><div class="label">R</div><div class="value" id="statR">0</div><div class="percent" id="statRPct">0%</div></div>
        </div>
    </div>

    <div class="pool-tabs">
        <button class="pool-tab active" data-pool="all">📋 全部</button>
        <button class="pool-tab" data-pool="A">A卡池-兔兔池</button>
        <button class="pool-tab" data-pool="B">B卡池-猫猫池</button>
    </div>

    <div class="toolbar">
        <button class="btn btn-primary" id="openAddModal">➕ 新增抽卡</button>
    </div>

    <div id="cardList">
        <div class="empty-state">还没有卡牌，点击「新增抽卡」开始记录！</div>
    </div>

    <div class="footer-actions">
        <button class="btn btn-danger" id="clearAllBtn">🗑️ 清空所有卡牌</button>
    </div>

    <!-- 新增抽卡弹窗 -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h2>📥 新增抽卡记录 <button class="close-btn" id="closeModal">✕</button></h2>
            <div class="form-group">
                <label>选择卡池</label>
                <select id="modalPool"><option value="A">A卡池-兔兔池</option><option value="B">B卡池-猫猫池</option></select>
            </div>
            <div class="form-group">
                <label>抽数</label>
                <input type="number" id="modalPullCount" value="5" min="1" max="99" />
            </div>
            <div class="form-group">
                <label>⏰ 时间模式</label>
                <div class="time-mode-group" id="timeModeGroup">
                    <button class="time-mode-btn active" data-mode="now">当前时间</button>
                    <button class="time-mode-btn" data-mode="custom">自定义时间</button>
                </div>
                <input type="datetime-local" id="customTimeInput" style="display:none; margin-top:6px;" />
            </div>
            <div class="form-group">
                <label>每一抽的卡牌</label>
                <div class="slot-list" id="slotList"></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="submitPull">✅ 确认添加</button>
                <button class="btn btn-danger" id="cancelModal">取消</button>
            </div>
            <div id="modalMessage"></div>
        </div>
    </div>

    <!-- 卡牌详情弹窗 -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <button class="close-btn" id="closeDetail" style="float:right;font-size:24px;background:none;border:none;cursor:pointer;">✕</button>
            <img id="detailImage" src="" alt="卡牌图片" />
            <div id="detailName"></div>
            <div id="detailRarity"></div>
            <div id="detailHistory"></div>
        </div>
    </div>

    <!-- 分类照片弹窗（仅非UR使用） -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal" style="max-width:520px;">
            <h2>📸 <span id="categoryModalTitle">分类名称</span>
                <button class="close-btn" id="closeCategoryModal">✕</button>
            </h2>
            <div class="category-grid" id="categoryGrid"></div>
        </div>
    </div>
</div>

<script>
    // ================================================================
    //  数据配置
    // ================================================================

    const STORAGE_KEY = 'tenniversary_cards_final_v10';

    const CARD_CATEGORIES = {
        'R': [
            { category: '写真卡', ids: ['r1', 'r2', 'r3', 'r4'] },
            { category: '活动卡', ids: ['r5', 'r6', 'r7', 'r8'] },
            { category: '横卡', ids: ['r9', 'r10', 'r11', 'r12'] }
        ],
        'SR': [
            { category: '背影卡', ids: ['sr1', 'sr2'] },
            { category: '宠物卡', ids: ['sr3', 'sr4', 'sr5', 'sr6'] },
            { category: '拼字卡', ids: ['sr7', 'sr8', 'sr9', 'sr10'] },
            { category: '童年卡', ids: ['sr11'] }
        ],
        'SSR': [
            { category: '搞怪卡', ids: ['ssr1', 'ssr2', 'ssr3'] },
            { category: '古风卡', ids: ['ssr4', 'ssr5'] },
            { category: '早期卡', ids: ['ssr6', 'ssr7', 'ssr8'] }
        ],
        'SP': [
            { category: '手写卡', ids: ['sp1', 'sp2', 'sp3', 'sp4'] },
            { category: '连环画卡', ids: ['sp5', 'sp6'] }
        ]
    };

    const UR_CATEGORIES = {
        'A': [
            { category: '兔兔卡套', ids: ['ur1'] },
            { category: '兔娃娃', ids: ['ur2'] },
            { category: '施华蔻洗发水', ids: ['ur3'] },
            { category: '星期六洞洞鞋', ids: ['ur4'] },
            { category: '签名照', ids: ['ur5'] }
        ],
        'B': [
            { category: '猫猫卡套', ids: ['ur1'] },
            { category: '猫娃娃', ids: ['ur2'] },
            { category: '施华蔻洗发水', ids: ['ur3'] },
            { category: '星期六洞洞鞋', ids: ['ur4'] },
            { category: '签名照', ids: ['ur5'] }
        ]
    };

    const RARITY_ORDER = { 'UR': 0, 'SP': 1, 'SSR': 2, 'SR': 3, 'R': 4 };

    function getAllCardIds() {
        const ids = [];
        Object.keys(CARD_CATEGORIES).forEach(rarity => {
            CARD_CATEGORIES[rarity].forEach(cat => {
                cat.ids.forEach(id => { ids.push(id); });
            });
        });
        for (let i = 1; i <= 5; i++) { ids.push('ur' + i); }
        return ids;
    }

    function getRarity(id) {
        if (id.startsWith('ur')) return 'UR';
        for (const [rarity, cats] of Object.entries(CARD_CATEGORIES)) {
            for (const cat of cats) {
                if (cat.ids.includes(id)) return rarity;
            }
        }
        return 'R';
    }

    function getCategory(id, pool) {
        if (id.startsWith('ur')) {
            if (UR_CATEGORIES[pool]) {
                for (const cat of UR_CATEGORIES[pool]) {
                    if (cat.ids.includes(id)) return cat.category;
                }
            }
            return 'UR';
        }
        for (const [rarity, cats] of Object.entries(CARD_CATEGORIES)) {
            for (const cat of cats) {
                if (cat.ids.includes(id)) return cat.category;
            }
        }
        return id;
    }

    function getDisplayName(id, pool) {
        return id;
    }

    // ===== 图片路径：所有卡都区分池子 =====
    function getCardImagePath(pool, id) {
        return `./images/${pool}_${id}.png`;
    }

    // 分类标签弹窗：使用分类名图片（仅非UR）
    function getCategoryImagePath(pool, category) {
        return `./images/${pool}_${category}.png`;
    }

    function getRarityColor(r) {
        const map = { R: '#5B8DD9', SR: '#9B59B6', SSR: '#d4a017', SP: '#E74C3C', UR: '#E91E63' };
        return map[r] || '#888';
    }

    function getDefaultData() { return { cards: [] }; }

    function loadData() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                if (parsed && Array.isArray(parsed.cards)) {
                    parsed.cards.forEach(c => {
                        if (!c.history || !Array.isArray(c.history)) {
                            const count = c.count || 1;
                            const now = new Date().toISOString();
                            c.history = [];
                            for (let i = 0; i < count; i++) {
                                c.history.push({ time: now, globalIndex: 0 });
                            }
                        } else {
                            if (c.history.length > 0 && typeof c.history[0] === 'string') {
                                c.history = c.history.map(t => ({ time: t, globalIndex: 0 }));
                            }
                        }
                        c.count = c.history.length;
                    });
                    return parsed;
                }
            }
        } catch (_) {}
        return getDefaultData();
    }

    function saveData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getTotalPulls() {
        let total = 0;
        appData.cards.forEach(c => { total += c.history.length; });
        return total;
    }

    function genId() {

    function formatTime(iso) {
        const d = new Date(iso);
        return d.toLocaleString('zh-CN', { hour12: false });

    function renderStats() {
        const allCards = appData.cards;
        let total = 0;
        const counts = { UR: 0, SP: 0, SSR: 0, SR: 0, R: 0 };
        allCards.forEach(c => {
            const r = getRarity(c.name);
            if (counts.hasOwnProperty(r)) counts[r] += c.history.length;
            total += c.history.length;
        });

        statTotal.textContent = total;
        statUR.textContent = counts.UR;
        statSP.textContent = counts.SP;
        statSSR.textContent = counts.SSR;
        statSR.textContent = counts.SR;
        statR.textContent = counts.R;

        const pct = (n) => total === 0 ? '0%' : Math.round((n / total) * 100) + '%';
        statTotalPct.textContent = '100%';
        statURPct.textContent = pct(counts.UR);
        statSPPct.textContent = pct(counts.SP);
        statSSRPct.textContent = pct(counts.SSR);
        statSRPct.textContent = pct(counts.SR);
        statRPct.textContent = pct(counts.R);
    }

    function renderHistoryGrouped(history) {
        if (!history || history.length === 0) {
            return '<div style="color:#999;text-align:center;">还没有抽到这张卡</div>';
        }

        const groups = {};
        history.forEach(entry => {
            const key = entry.time;
            if (!groups[key]) {
                groups[key] = { time: key, indices: [] };
            }
            groups[key].indices.push(entry.globalIndex);
        });

        const sortedKeys = Object.keys(groups).sort((a, b) => new Date(a) - new Date(b));

        let html = '';
        let batchNum = 1;
        sortedKeys.forEach(key => {
            const group = groups[key];
            const sortedIndices = group.indices.sort((a, b) => a - b);
            const timeStr = formatTime(key);
            const indicesStr = sortedIndices.map(idx => `<span class="idx-item">第${idx}抽</span>`).join('');

            html += `
                <div class="batch-group">
                    <div class="batch-title">第 ${batchNum} 批</div>
                    <div class="batch-time">⏰ ${timeStr}</div>
                    <div class="batch-index-list">${indicesStr}</div>
                </div>
            `;
            batchNum++;
        });

        return html;
    }

    // ================================================================
    //  新增抽卡弹窗
    // ================================================================

    function openModal() {
        addModal.classList.add('active');
        modalMessage.textContent = '';
        const count = parseInt(modalPullCount.value, 10) || 5;
        const pool = modalPool.value;
        renderSlots(count, pool);
        setTimeMode('now');
        modalPool.onchange = function() {
            const newPool = this.value;
            const cnt = parseInt(modalPullCount.value, 10) || 5;
            renderSlots(cnt, newPool);
        };
    }

    function closeModal() {
        addModal.classList.remove('active');
    }

    function renderSlots(count, pool) {
        const cardIds = getAllCardIds();
        let html = '';
        for (let i = 0; i < count; i++) {
            html += `
                <div class="slot-row" data-index="${i}">
                    <span class="slot-index">#${i+1}</span>
                    <select class="slot-card">
                        ${cardIds.map(id => `<option value="${id}">${id}</option>`).join('')}
                    </select>
                </div>
            `;
        }
        slotList.innerHTML = html;
    }

    function setTimeMode(mode) {
        const btns = timeModeGroup.querySelectorAll('.time-mode-btn');
        btns.forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });
        if (mode === 'custom') {
            customTimeInput.style.display = 'block';
            if (!customTimeInput.value) {
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                customTimeInput.value = now.toISOString().slice(0, 16);
            }
        } else {
            customTimeInput.style.display = 'none';
        }
    }

    function submitPull() {
        const pool = modalPool.value;
        const rows = slotList.querySelectorAll('.slot-row');
        const cardsToAdd = [];
        let hasError = false;

        rows.forEach(row => {
            const select = row.querySelector('.slot-card');
            const name = select.value;
            if (!name) {
                hasError = true;
                row.style.border = '2px solid #e74c3c';
                return;
            } else {
                row.style.border = '1px solid #edeaf3';
            }
            cardsToAdd.push(name);
        });

        if (hasError) {
            modalMessage.textContent = '请选择所有卡牌！';
            return;
        }

        const activeMode = timeModeGroup.querySelector('.time-mode-btn.active');
        let recordTime;
        if (activeMode && activeMode.dataset.mode === 'custom') {
            const val = customTimeInput.value;
            if (!val) {
                modalMessage.textContent = '请选择自定义时间！';
                return;
            }
            const d = new Date(val);
            if (isNaN(d.getTime())) {
                modalMessage.textContent = '无效的时间格式！';
                return;
            }
            recordTime = d.toISOString();
        } else {
            recordTime = new Date().toISOString();
        }

        let currentGlobalIndex = getTotalPulls();

        cardsToAdd.forEach(name => {
            currentGlobalIndex++;
            const existing = appData.cards.find(c => c.pool === pool && c.name === name);
            if (existing) {
                existing.history.push({ time: recordTime, globalIndex: currentGlobalIndex });
                existing.count = existing.history.length;
            } else {
                appData.cards.push({
                    id: genId(),
                    pool: pool,
                    name: name,
                    history: [{ time: recordTime, globalIndex: currentGlobalIndex }],
                    count: 1
                });
            }
        });

        saveData(appData);
        renderAll();
        closeModal();
        modalMessage.textContent = '';
        alert(`✅ 成功记录 ${cardsToAdd.length} 张卡牌！\n⏰ 时间：${formatTime(recordTime)}`);
    }

    function clearAllData() {
        const total = getTotalPulls();
        if (total === 0) {
            alert('当前没有任何卡牌数据需要清空。');
            return;
        }
        if (confirm(`⚠️ 确定要清空所有 ${total} 张卡牌记录吗？此操作不可撤销！`)) {
            appData.cards = [];
            saveData(appData);
            renderAll();
            alert('✅ 已清空所有卡牌数据！');
        }
    }

            const r1 = appData.cards.find(c => c.name === 'r1' && c.pool === 'A');
            if (r1) {
                const t2 = new Date(Date.now() + 60000).toISOString();
                r1.history.push({ time: t2, globalIndex: 2 });
                const t3 = new Date(Date.now() + 120000).toISOString();
                r1.history.push({ time: t3, globalIndex: 5 });
                r1.history.push({ time: t3, globalIndex: 7 });
                r1.count = 4;
            }
            saveData(appData);
        }
    }

    // ================================================================
    //  启动
    // ================================================================

    initSampleData();
    appData = loadData();
    renderAll();

    console.log('🎉 10周年抽抽乐已启动！');
    console.log(`📊 当前共有 ${getTotalPulls()} 张卡牌记录`);
</script>
